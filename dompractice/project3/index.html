</head>
<body>
 <div class="cantainer">
    <h1 class="heading">BMI CALCULATOR</h1>


    <form action="">
        <label for="height">enter the heigh:</label>
   <input type="text" placeholder="enter the height in cm" id="height">

 <label for="weight">enter the weight</label>
<input type="text" name="weight" id="weight" placeholder="enter the weigth in kg">
   
   <button type="button">calculate</button>
</form>

 <div class="result"></div>


 <div class="info">
    <h3>BMI weigth guide </h3>

    <p>under weight = less than 18.6</p>
    <p>Normal Range =  18.6 and 24.9</p>

 </div>





 
 </div>
